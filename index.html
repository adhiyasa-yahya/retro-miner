<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description"
        content="Retro Miner is a simple retro-style game where you collect gold and avoid enemies.">
    <meta name="google-site-verification" content="YWXU2jOvDvgN6RiHTwcOboW4C40En67CWcKl7leez5s" />
    <title>Retro Miner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
</head>

<body>
    <canvas id="game" width="320" height="240"></canvas>

    <!-- MENU OVERLAY -->
    <div id="menu-overlay" class="overlay visible">
        <div class="overlay-content">
            <h1>RETRO MINER</h1>
            <p class="subtitle">Collect the gold, avoid the enemies!</p>
            <p class="high-score">High Score: <span id="menu-hs">0</span></p>
            <button id="btn-start" class="btn-overlay">START GAME</button>
            <p class="hint">Arrow keys / D-Pad to move &bull; ESC to pause</p>
        </div>
    </div>

    <!-- PAUSE OVERLAY -->
    <div id="pause-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h1>PAUSED</h1>
            <p>Press ESC to resume</p>
        </div>
    </div>

    <!-- GAME OVER OVERLAY -->
    <div id="gameover-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h1>GAME OVER</h1>
            <p class="final-score">Score: <span id="final-score">0</span></p>
            <p id="new-hs-msg" class="new-highscore hidden">NEW HIGH SCORE!</p>
            <p class="high-score">High Score: <span id="gameover-hs">0</span></p>
            <button id="btn-restart" class="btn-overlay">PLAY AGAIN</button>
        </div>
    </div>

    <!-- D-PAD -->
    <div class="dpad" id="dpad">
        <div class="btn up" data-key="ArrowUp">▲</div>
        <div class="btn left" data-key="ArrowLeft">◀</div>
        <div class="btn right" data-key="ArrowRight">▶</div>
        <div class="btn down" data-key="ArrowDown">▼</div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/map.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/input.js"></script>
    <script src="js/render.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
